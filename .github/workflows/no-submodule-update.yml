name: No submodule update checker

on:
  pull_request:
    paths:
      - 'RobustToolbox'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  this_aint_right:
    name: Submodule update in pr found
    runs-on: ubuntu-latest
    # ministation maintains its own RT fork; allow intentional engine bumps on rt/* or opt/* branches or labelled PRs.
    if: |
      !startsWith(github.head_ref, 'rt') &&
      !startsWith(github.head_ref, 'opt') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'rt-update') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'submodule-update')
    steps:
      - name: Fail
        run: |
          echo "::error::RobustToolbox submodule was changed in this PR. Engine updates should use an rt/* branch or add the rt-update label."
          exit 1

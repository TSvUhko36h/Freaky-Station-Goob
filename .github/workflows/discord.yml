name: Discord PR Notifications

on:
  pull_request:
    types:
      - closed

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          cat > payload.json <<EOF
          {
            "username": "Freaky Station",
            "embeds": [
              {
                "title": "🚀 Pull Request Merged",
                "description": "**${{ github.event.pull_request.title }}**\n\nby **${{ github.event.pull_request.user.login }}**\n\n🌿 \`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\`\n🔗 PR #${{ github.event.pull_request.number }}",
                "url": "${{ github.event.pull_request.html_url }}",
                "color": 16716936,
                "author": {
                  "name": "${{ github.event.pull_request.user.login }}",
                  "icon_url": "${{ github.event.pull_request.user.avatar_url }}"
                },
                "fields": [
                  {
                    "name": "📊 Changes",
                    "value": "```diff\n+ ${{ github.event.pull_request.additions }} lines\n- ${{ github.event.pull_request.deletions }} lines\n```",
                    "inline": false
                  },
                  {
                    "name": "📁 Files changed",
                    "value": "${{ github.event.pull_request.changed_files }}",
                    "inline": true
                  },
                  {
                    "name": "📝 Commits",
                    "value": "${{ github.event.pull_request.commits }}",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Freaky Station • GitHub"
                },
                "timestamp": "${{ github.event.pull_request.merged_at }}"
              }
            ]
          }
          EOF

          curl \
            -H "Content-Type: application/json" \
            -X POST \
            -d @payload.json \
            "$WEBHOOK"

# Production-oriented network tuning for Mini Station.
# Merge with your main server config or load via --config-file.

[net]
pvs_range = 21
pvs_priority_range = 23
pvs_compress_level = 2
pvs_dirty_buffer_ticks = 30
tickrate = 30
log_late_msg = false
gasoverlaytickrate = 4.5
gasoverlaythresholds = 35
atmosdbgoverlaytickrate = 4.5

[midi]
max_events_per_second = 400
max_events_per_batch = 40

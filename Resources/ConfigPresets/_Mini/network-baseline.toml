# Network profiling preset — enable Prometheus and verbose net logging for baseline KPI capture.
# Usage: run server with --config-file pointing at this preset (optionally merged with your server config).

[metrics]
enabled = true
host = "127.0.0.1"
port = 44880

[net]
log_late_msg = true

# Key Prometheus histograms to watch:
# - robust_game_state_update_usage{area="Serialize States"}
# - robust_game_state_update_usage{area="Send States"}
# - robust_game_state_update_usage{area="Process Leave"}
# - npc_active_count
#
# Client baseline: enable netgraph overlay (Options > Network) and set:
#   net.buffer_size = 2-3
#   net.pvs_enter_budget = 150-250

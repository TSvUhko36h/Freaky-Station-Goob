#
# Досрочное открытие антагов в лобби и магазине токенов.
# Для ролей из магазина maxCost не ниже shopCost * shopCostMultiplier.

- type: antagUnlockCatalog
  id: Default
  pricing:
    hoursPerCoinStep: 4
    minCost: 1
    regularCoinsPerStep: 2
    commandCoinsPerStep: 4
  useShopCostMultiplier: true
  shopCostMultiplier: 5
  defaultTier:
    maxCost: 15
    command: false
  tiers: []

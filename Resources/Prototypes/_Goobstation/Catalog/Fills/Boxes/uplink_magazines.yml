# Syndicate uplink magazine bundles — cheaper calibers sold in boxes, not singles.

- type: entity
  parent: [BoxMagazine, BaseSyndicateContraband]
  id: BaseSyndicateUplinkMagazineBundle
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: box_of_doom
    - state: magazine

- type: entity
  parent: BaseSyndicateUplinkMagazineBundle
  id: BoxSyndicateMagazinePistol
  name: syndicate magazine box (.35 auto)
  description: A syndicate-branded box with three .35 auto pistol magazines.
  components:
  - type: StorageFill
    contents:
    - id: MagazinePistol
      amount: 3

- type: entity
  parent: BaseSyndicateUplinkMagazineBundle
  id: BoxSyndicateMagazinePistolSubMachineGun

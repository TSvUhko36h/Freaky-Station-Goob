- type: entity
  name: Bubblegum
  id: LavalandBossBubblegum
  parent: LavalandMobBase
  description: In what passes for a hierarchy among slaughter demons, this one is king.
  components:
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.75
        density: 320
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: IdleCompound
  - type: Sprite
    drawdepth: Mobs
    sprite: _Lavaland/Mobs/Bubblegum.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bubblegum
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    soundHit:
      path: /Audio/_Lavaland/Mobs/Bosses/Bubblegum/demon_attack1.ogg
    animation: WeaponArcBite
    attackRate: 0.8
    damage:
      types:
        Slash: 40
        Structural: 40
  - type: Tag
    tags:
    - CannotSuicide
    - FootstepSound
  - type: CombatMode
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Hierophant
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 1000000
      behaviors:
      - !type:GibBehavior { }
  - type: FootstepModifier
    footstepSoundCollection:
      collection: BossImpactFootstep
      params:
        volume: -5
  - type: TileMovement
  - type: BossMusic
    soundId: Bubblegum
  - type: Aggressive
    autoAddOnDamage: false
    forgiveRange: 40.0
  - type: Anger
    totalHp: 2500
  - type: AngerPlayerScaling
    angerScale: 1.1
    hpScale: 1.2
  - type: CombatPower
    factor: 25
  - type: Bubblegum
  - type: SpawnLootOnDeath
    table: !type:AllSelector
      children:
      - id: OrganSlaughterHeart
    deleteOnDeath: true
  - type: NoSlip
  - type: RequireProjectileTarget
